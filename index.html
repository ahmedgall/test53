<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Win100 - Live Matches</title>
    <style>
        :root { --gold: #ffd700; --dark: #0a0a0a; --gray: #1a1a1a; --neon: #00ff41; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 20px; border-bottom: 2px solid var(--gold); margin-bottom: 30px; }
        .container { max-width: 1100px; margin: auto; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .match-card { background: var(--gray); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; position: relative; overflow: hidden; }
        .match-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--gold); }
        .teams { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        .odds-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .bet-btn { background: #222; border: 1px solid var(--gold); color: var(--gold); padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .bet-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }
        .bet-btn span { display: block; font-size: 10px; color: #888; margin-bottom: 4px; }
        .cart-panel { background: var(--gray); border: 2px solid var(--gold); border-radius: 15px; padding: 20px; height: fit-content; position: sticky; top: 20px; }
        .cart-item { background: #000; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-right: 3px solid var(--neon); }
        .confirm-btn { width: 100%; background: var(--neon); color: black; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.1rem; }
        .loading { color: var(--gold); text-align: center; font-size: 1.5rem; margin-top: 50px; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="color: var(--gold); margin: 0;">Win100 Sports ⚽️</h1>
    <p>بيانات حية ومباشرة من السيرفر العالمي</p>
</div>

<div id="loader" class="loading">جاري سحب الماتشات والـ Odds...</div>

<div class="container" id="main-content" style="display: none;">
    <div id="matches-container"></div>

    <div class="cart-panel">
        <h3 style="color: var(--gold); margin-top: 0;">حقيبة الرهان 🛒</h3>
        <div id="cart-list">
            <p style="color: #666; text-align: center;">اختر رهاناً للبدء</p>
        </div>
        <div id="cart-summary" style="display: none; border-top: 1px solid #444; margin-top: 15px; padding-top: 15px;">
            <p>إجمالي الـ Odds: <span id="total-odds" style="color: var(--neon); font-weight: bold;">1.00</span></p>
            <button class="confirm-btn" onclick="confirmBet()">تأكيد الرهان 💰</button>
        </div>
    </div>
</div>

<script>
    const MY_KEY = '4a63ffac5fe58a9ec09b22e305c61c02'; // المفتاح بتاعك شغال هنا
    const SPORT = 'soccer_epl'; // الدوري الإنجليزي الممتاز
    let currentSlip = [];

    async function loadLiveOdds() {
        try {
            const response = await fetch(`https://api.the-odds-api.com/v4/sports/${SPORT}/odds/?apiKey=${MY_KEY}&regions=eu&markets=h2h&oddsFormat=decimal`);
            const data = await response.json();
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.display = 'grid';
            
            displayMatches(data);
        } catch (err) {
            document.getElementById('loader').innerText = "خطأ في الاتصال.. اتأكد إن الـ API Key سليم.";
        }
    }

    function displayMatches(matches) {
        const container = document.getElementById('matches-container');
        container.innerHTML = '';

        matches.slice(0, 15).forEach(match => {
            const h2h = match.bookmakers[0]?.markets.find(m => m.key === 'h2h');
            if (!h2h) return;

            const homeOdd = h2h.outcomes.find(o => o.name === match.home_team).price;
            const awayOdd = h2h.outcomes.find(o => o.name === match.away_team).price;
            const drawOdd = h2h.outcomes.find(o => o.name === 'Draw').price;

            container.innerHTML += `
                <div class="match-card">
                    <div class="teams">
                        <span>${match.home_team}</span>
                        <span style="color: var(--gold);">VS</span>
                        <span>${match.away_team}</span>
                    </div>
                    <div class="odds-row">
                        <button class="bet-btn" onclick="addToSlip('${match.id}', '${match.home_team}', ${homeOdd})">
                            <span>فوز ${match.home_team}</span> ${homeOdd}
                        </button>
                        <button class="bet-btn" onclick="addToSlip('${match.id}', 'تعادل', ${drawOdd})">
                            <span>تعادل</span> ${drawOdd}
                        </button>
                        <button class="bet-btn" onclick="addToSlip('${match.id}', '${match.away_team}', ${awayOdd})">
                            <span>فوز ${match.away_team}</span> ${awayOdd}
                        </button>
                    </div>
                </div>
            `;
        });
    }

    function addToSlip(id, team, price) {
        if (currentSlip.find(i => i.id === id)) {
            alert("الماتش ده موجود فعلاً في الحقيبة!");
            return;
        }
        currentSlip.push({ id, team, price });
        updateCartUI();
    }

    function updateCartUI() {
        const list = document.getElementById('cart-list');
        const summary = document.getElementById('cart-summary');
        
        if (currentSlip.length === 0) {
            list.innerHTML = '<p style="color: #666; text-align: center;">اختر رهاناً للبدء</p>';
            summary.style.display = 'none';
            return;
        }

        summary.style.display = 'block';
        list.innerHTML = currentSlip.map((item, index) => `
            <div class="cart-item">
                <div style="display: flex; justify-content: space-between;">
                    <small>${item.team}</small>
                    <b style="color: var(--gold)">@${item.price}</b>
                </div>
                <button onclick="remove(${index})" style="background:none; border:none; color:red; cursor:pointer; font-size:10px; padding:0;">[ حذف ]</button>
            </div>
        `).join('');

        const total = currentSlip.reduce((acc, curr) => acc * curr.price, 1).toFixed(2);
        document.getElementById('total-odds').innerText = total;
    }

    function remove(idx) {
        currentSlip.splice(idx, 1);
        updateCartUI();
    }

    function confirmBet() {
        alert("تم إرسال القسيمة للسيرفر! جاري الربط مع Firestore...");
    }

    loadLiveOdds();
</script>

</body>
</html>
