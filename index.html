<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win100 AI | المساعد الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #f59e0b;
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #020617);
            background-attachment: fixed;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .ai-status {
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
        }

        .header-info h2 { font-size: 16px; margin: 0; font-weight: 900; }
        .header-info span { font-size: 10px; color: #10b981; font-weight: 700; }

        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 22px;
            font-size: 14px;
            line-height: 1.6;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-msg {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--border);
            border-bottom-right-radius: 4px;
        }

        .user-msg {
            align-self: flex-end;
            background: var(--primary);
            color: #000;
            font-weight: 700;
            border-bottom-left-radius: 4px;
        }

        .input-box {
            padding: 15px 20px 30px;
            background: rgba(2, 6, 23, 0.9);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        #userInput {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 15px;
            color: #fff;
            outline: none;
        }

        .send-btn {
            background: var(--primary);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        /* لودينج النقاط المتطايرة */
        .typing-dots span {
            display: inline-block;
            width: 6px; height: 6px;
            background: #fff; border-radius: 50%;
            margin: 0 2px;
            animation: bounce 0.6s infinite alternate;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }

    </style>
</head>
<body>

    <header class="chat-header">
        <div class="ai-status"><i class="fas fa-robot"></i></div>
        <div class="header-info">
            <h2>مساعد Win100 الذكي</h2>
            <span>متصل الآن</span>
        </div>
        <button onclick="window.location.href='home.html'" style="margin-right:auto; background:none; border:none; color:#64748b; font-size:22px;"><i class="fas fa-times-circle"></i></button>
    </header>

    <div id="chat-flow">
        <div class="msg bot-msg">أهلاً يا بطل! أنا ذكاء Win100 الاصطناعي.. اسألني عن الماتشات أو الألعاب وأنا هرد عليك فوراً. ⚽🔥</div>
    </div>

    <div class="input-box">
        <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." autocomplete="off">
        <button class="send-btn" onclick="askAI()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        const API_KEY = "AIzaSyC5qyb_Wr4FxmojUAIrDtDvqxnOFaaEScw";
        const flow = document.getElementById('chat-flow');
        const input = document.getElementById('userInput');

        async function askAI() {
            const text = input.value.trim();
            if (!text) return;

            // إظهار رسالة المستخدم
            addMessage(text, 'user-msg');
            input.value = "";
            
            // إضافة لودينج
            const loadingId = "loading-" + Date.now();
            addMessage('<div class="typing-dots"><span></span><span></span><span></span></div>', 'bot-msg', loadingId);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `أنت مساعد ذكي لموقع Win100 للمراهنات. 
                                اسمك: مساعد Win100 الذكي.
                                رد بذكاء وبلهجة مصرية خفيفة واحترافية. 
                                حلل الماتشات واشرح الألعاب (مثل الطيار). 
                                سؤال المستخدم: ${text}`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                
                // التأكد من وصول الرد بنجاح
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    document.getElementById(loadingId).remove();
                    addMessage(aiText, 'bot-msg');
                } else {
                    throw new Error("Invalid API Response");
                }

            } catch (error) {
                document.getElementById(loadingId).innerText = "عذراً يا بطل، في ضغط كبير على السيرفر حالياً.. جرب تسألني كمان دقيقة!";
                console.error("AI Error:", error);
            }
        }

        function addMessage(text, className, id = null) {
            const div = document.createElement('div');
            div.className = `msg ${className}`;
            if (id) div.id = id;
            div.innerHTML = text.replace(/\n/g, '<br>');
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') askAI(); });
    </script>
</body>
</html>
