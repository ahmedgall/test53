<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة فاتورة | الناصرية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --primary: #10b981; --dark: #0f172a; --bg: #f1f5f9; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); padding: 10px; margin: 0; }
        .app-container { max-width: 600px; margin: auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; outline: none; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th { background: #f8fafc; padding: 10px; font-size: 13px; border: 1px solid #eee; }
        td { border: 1px solid #eee; padding: 5px; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-save { background: var(--primary); color: white; }
        .btn-add { background: var(--dark); color: white; }
        .btn-delete-all { background: #ef4444; color: white; margin-top: 5px; font-size: 12px; padding: 10px; }
        .btn-view { background: #fff; color: var(--dark); border: 2px solid var(--dark); text-decoration: none; display: block; text-align: center; margin-top: 20px; }
        .total-box { background: var(--dark); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1 style="margin:0; color: var(--dark);">  <span style="color:var(--primary)">الناصريه</span></h1>
    </header>

    <input type="text" id="clientName" placeholder="اسم العميل">
    
    <table>
        <thead>
            <tr>
                <th>الصنف</th>
                <th style="width:60px">كمية</th>
                <th style="width:80px">سعر</th>
                <th>إجمالي</th>
            </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>

    <button class="btn btn-add" onclick="addNewRow()">+ إضافة صنف</button>
    <button class="btn btn-save" onclick="saveToVexa()">💾 حفظ سحابي</button>


    <div class="total-box">
        <div style="font-size:24px; font-weight:800;"><span id="finalTotal">0</span> ر.س</div>
    </div>

    <a href="view.html" class="btn btn-view">📂 الذهاب لسجل الفواتير</a>

    <button class="btn btn-delete-all" onclick="deleteAllInvoices()">🗑️ حذف جميع الفواتير نهائياً</button>

</div>



<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        storageBucket: "vexa-4b2fb.firebasestorage.app",
        messagingSenderId: "977620445308",
        appId: "1:977620445308:web:71e66418d95c43dc8881f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function addNewRow() {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="in-name" style="margin:0"></td>
            <td><input type="number" class="in-qty" oninput="calculate()" style="margin:0"></td>
            <td><input type="number" class="in-price" oninput="calculate()" style="margin:0"></td>
            <td style="font-weight:bold; text-align:center;"><span class="in-sub">0</span></td>
        `;
        document.getElementById('rows').appendChild(tr);
    }

    function calculate() {
        let grand = 0;
        document.querySelectorAll('#rows tr').forEach(row => {
            const q = row.querySelector('.in-qty').value || 0;
            const p = row.querySelector('.in-price').value || 0;
            const sub = q * p;
            row.querySelector('.in-sub').innerText = sub;
            grand += sub;
        });
        document.getElementById('finalTotal').innerText = grand;
    }

    async function saveToVexa() {
        const items = [];
        document.querySelectorAll('#rows tr').forEach(row => {
            const name = row.querySelector('.in-name').value;
            if(name) {
                items.push({ item: name, qty: row.querySelector('.in-qty').value, price: row.querySelector('.in-price').value, total: row.querySelector('.in-sub').innerText });
            }
        });
        if(items.length === 0) return alert("أضف بيانات!");
        try {
            await db.collection("invoices").add({
                customer: document.getElementById('clientName').value || "عميل بدون اسم",
                totalAmount: document.getElementById('finalTotal').innerText,
                billItems: items,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("✅ تم الحفظ!");
            location.reload();
        } catch (e) { alert("خطأ!"); }
    }

    // دالة حذف جميع الفواتير
    async function deleteAllInvoices() {
        if (confirm("هل أنت متأكد من حذف جميع الفواتير من السحابة؟ لا يمكن التراجع!")) {
            try {
                const snapshot = await db.collection("invoices").get();
                const batch = db.batch();
                snapshot.docs.forEach((doc) => {
                    batch.delete(doc.ref);
                });
                await batch.commit();
                alert("🗑️ تم مسح السجل بالكامل بنجاح!");
                location.reload();
            } catch (e) {
                alert("فشل الحذف: " + e.message);
            }
        }
    }

    addNewRow();
</script>
</body>
</html>
