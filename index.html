<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win100 AI | المساعد الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #f59e0b; /* ذهبي */
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #020617);
            background-attachment: fixed;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* هيدر الشات */
        .chat-header {
            padding: 20px;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .ai-status {
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 20px;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
        }

        .header-info h2 { font-size: 16px; margin: 0; font-weight: 900; }
        .header-info span { font-size: 10px; color: #10b981; font-weight: 700; }

        /* منطقة الرسائل */
        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: none;
        }
        #chat-flow::-webkit-scrollbar { display: none; }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 22px;
            font-size: 14px;
            line-height: 1.6;
            position: relative;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-msg {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--border);
            border-bottom-right-radius: 4px;
            color: #e2e8f0;
        }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), #d97706);
            color: #000;
            font-weight: 700;
            border-bottom-left-radius: 4px;
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.2);
        }

        /* منطقة الإدخال */
        .input-box {
            padding: 20px;
            background: rgba(2, 6, 23, 0.9);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #userInput {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 18px;
            color: #fff;
            font-family: 'Cairo';
            outline: none;
            transition: 0.3s;
        }

        #userInput:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }

        .send-btn {
            background: var(--primary);
            border: none;
            width: 55px;
            height: 52px;
            border-radius: 18px;
            color: #000;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:active { transform: scale(0.9); }

        /* لودينج خفيف */
        .typing { font-style: italic; opacity: 0.7; font-size: 12px; }

    </style>
</head>
<body>

    <header class="chat-header">
        <div class="ai-status"><i class="fas fa-robot"></i></div>
        <div class="header-info">
            <h2>مساعد Win100 الذكي</h2>
            <span><i class="fas fa-circle"></i> متصل وبحلل البيانات..</span>
        </div>
        <div style="margin-right: auto;">
            <button onclick="window.location.href='home.html'" style="background:none; border:none; color:#64748b; font-size:20px;"><i class="fas fa-house"></i></button>
        </div>
    </header>

    <div id="chat-flow">
        <div class="msg bot-msg">
            يا هلا بيك في <b>Win100</b>! 🔥 
            أنا مساعدك الشخصي المدعوم بالذكاء الاصطناعي.. تحب تتوقع نتيجة ماتش إيه النهاردة؟ أو محتاج استراتيجية لألعاب الكازينو؟ أنا معاك!
        </div>
    </div>

    <div class="input-box">
        <input type="text" id="userInput" placeholder="اسألني عن الماتشات أو الألعاب..." autocomplete="off">
        <button class="send-btn" onclick="askAI()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        const API_KEY = "AIzaSyD7DJcm6QuBHsbbbv0IgemzAyYsw9BUxCw";
        const flow = document.getElementById('chat-flow');
        const input = document.getElementById('userInput');

        async function askAI() {
            const text = input.value.trim();
            if (!text) return;

            // إضافة رسالة المستخدم
            addMessage(text, 'user-msg');
            input.value = "";
            
            // إضافة رسالة لودينج
            const loadingId = "loading-" + Date.now();
            addMessage("بيفكر ثواني... ⚡", 'bot-msg typing', loadingId);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `أنت مساعد ذكي خبير في موقع Win100 للمراهنات الرياضية والكازينو. 
                                هدفك: مساعدة المستخدمين وتحليل المباريات وتوضيح قوانين الألعاب (Aviator, Mines, Roulette). 
                                هويتك: مرح، ذكي، وتستخدم اللهجة المصرية الاحترافية.
                                تنبيه: لا تضمن الربح أبداً، قل دائماً "العب بذكاء وللمتعة".
                                سؤال المستخدم: ${text}`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;

                // حذف اللودينج وإضافة الرد الحقيقي
                document.getElementById(loadingId).remove();
                addMessage(aiText, 'bot-msg');

            } catch (error) {
                document.getElementById(loadingId).innerText = "حصل مشكلة في الشبكة، جرب تسألني تاني يا بطل!";
                console.error(error);
            }
        }

        function addMessage(text, className, id = null) {
            const div = document.createElement('div');
            div.className = `msg ${className}`;
            if (id) div.id = id;
            div.innerHTML = text.replace(/\n/g, '<br>');
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        // دعم زر Enter
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') askAI();
        });
    </script>
</body>
</html>
