<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win100 AI | المساعد الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #f59e0b; /* ذهبي ملكي */
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #020617);
            background-attachment: fixed;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* هيدر احترافي */
        .chat-header {
            padding: 20px;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
        }

        .ai-status-icon {
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 20px;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
        }

        .header-info h2 { font-size: 16px; margin: 0; font-weight: 900; }
        .header-info span { font-size: 10px; color: #10b981; font-weight: 700; display: flex; align-items: center; gap: 5px; }

        /* منطقة المحادثة */
        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: none;
        }
        #chat-flow::-webkit-scrollbar { display: none; }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 22px;
            font-size: 14px;
            line-height: 1.6;
            position: relative;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-msg {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--border);
            border-bottom-right-radius: 4px;
            color: #e2e8f0;
        }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), #d97706);
            color: #000;
            font-weight: 800;
            border-bottom-left-radius: 4px;
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.2);
        }

        /* منطقة الكتابة */
        .input-area {
            padding: 15px 20px 30px;
            background: rgba(2, 6, 23, 0.95);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #userInput {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 18px;
            color: #fff;
            font-family: 'Cairo';
            outline: none;
            transition: 0.3s;
        }

        #userInput:focus { border-color: var(--primary); }

        .send-btn {
            background: var(--primary);
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 18px;
            color: #000;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .send-btn:active { transform: scale(0.9); }

        /* لودينج النقاط */
        .dot-flashing {
            display: inline-flex;
            gap: 4px;
        }
        .dot-flashing div {
            width: 6px; height: 6px;
            background-color: #fff;
            border-radius: 50%;
            animation: dot-flashing 0.8s infinite alternate;
        }
        .dot-flashing div:nth-child(2) { animation-delay: 0.2s; }
        .dot-flashing div:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-flashing { from { opacity: 0.2; } to { opacity: 1; } }

    </style>
</head>
<body>

    <header class="chat-header">
        <div class="ai-status-icon"><i class="fas fa-robot"></i></div>
        <div class="header-info">
            <h2>مساعد Win100 الذكي</h2>
            <span><i class="fas fa-circle"></i> متصل الآن وبحلل الماتشات..</span>
        </div>
        <button onclick="window.location.href='home.html'" style="margin-right:auto; background:none; border:none; color:#64748b; font-size:22px;"><i class="fas fa-arrow-left"></i></button>
    </header>

    <div id="chat-flow">
        <div class="msg bot-msg">
            يا هلا بيك يا وحش في <b>Win100</b>! 🔥 <br>
            أنا مساعدك الشخصي.. عايز تعرف توقعات ماتشات النهاردة؟ ولا عايز استراتيجية "صايعة" للطيارة والألماس؟ اسألني وأنا هرد عليك فوراً!
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="اسألني عن أي حاجة في الألعاب..." autocomplete="off">
        <button class="send-btn" onclick="askAI()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        const API_KEY = "AIzaSyD7DJcm6QuBHsbbbv0IgemzAyYsw9BUxCw";
        const flow = document.getElementById('chat-flow');
        const input = document.getElementById('userInput');

        async function askAI() {
            const text = input.value.trim();
            if (!text) return;

            // 1. إظهار رسالة المستخدم
            addMessage(text, 'user-msg');
            input.value = "";
            
            // 2. إضافة لودينج النقاط
            const loadingId = "loading-" + Date.now();
            addMessage('<div class="dot-flashing"><div></div><div></div><div></div></div>', 'bot-msg', loadingId);

            try {
                // 3. طلب الرد من Gemini
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `أنت مساعد ذكي لموقع Win100 للمراهنات الرياضية. 
                                اسمك: مساعد Win100 الذكي.
                                هويتك: مرح، ذكي، خبير في الكورة والألعاب، وتستخدم اللهجة المصرية الاحترافية.
                                تنبيه: لا تضمن الربح 100%، دائماً قل "العب بذكاء".
                                سؤال المستخدم: ${text}`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                
                // 4. معالجة الرد وإظهاره
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    document.getElementById(loadingId).remove();
                    addMessage(aiText, 'bot-msg');
                } else {
                    throw new Error("API Error");
                }

            } catch (error) {
                // 5. في حالة الفشل
                document.getElementById(loadingId).innerHTML = "معلش يا بطل، في ضغط على السيرفر حالياً.. جرب تسألني كمان دقيقة!";
                console.error("AI Error:", error);
            }
        }

        function addMessage(text, className, id = null) {
            const div = document.createElement('div');
            div.className = `msg ${className}`;
            if (id) div.id = id;
            div.innerHTML = text.replace(/\n/g, '<br>');
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight; // النزول لآخر رسالة تلقائياً
        }

        // دعم الإرسال بـ Enter
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') askAI();
        });
    </script>
</body>
</html>
