<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win100 Ultra Pro | Markets</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #f59e0b; --bg: #020617; --card: #1e293b66; --border: rgba(245, 158, 11, 0.2); }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .header { position: sticky; top: 0; background: rgba(2,6,23,0.95); padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); z-index: 1000; backdrop-filter: blur(10px); }
        .bal-box { background: var(--card); border: 1px solid var(--gold); padding: 5px 15px; border-radius: 50px; color: var(--gold); font-weight: bold; font-size: 14px; }
        .leagues-nav { display: flex; gap: 10px; overflow-x: auto; padding: 15px; scrollbar-width: none; }
        .league-btn { background: var(--card); border: 1px solid var(--border); padding: 8px 20px; border-radius: 12px; white-space: nowrap; cursor: pointer; transition: 0.3s; color: #94a3b8; }
        .league-btn.active { background: var(--gold); color: #000; font-weight: bold; border-color: var(--gold); }
        
        .match-card { background: var(--card); margin: 10px 15px; padding: 20px; border-radius: 20px; border: 1px solid var(--border); backdrop-filter: blur(10px); cursor: pointer; }
        .teams { display: flex; justify-content: space-around; align-items: center; text-align: center; }
        .team-name { width: 40%; font-weight: 700; font-size: 14px; }

        /* الأسواق داخل الشيت */
        .market-section { margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; }
        .market-title { color: var(--gold); font-weight: bold; margin-bottom: 10px; border-right: 3px solid var(--gold); padding-right: 10px; font-size: 14px; }
        .odds-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .odd-item { background: var(--card); padding: 12px; border-radius: 10px; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: 0.2s; }
        .odd-item:active { background: var(--gold); color: #000; }

        .fab-gold { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(245,158,11,0.5); z-index: 2000; }
        .count { position: absolute; top: 0; right: 0; background: #ef4444; color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        
        .sheet { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85vh; background: #0f172a; border-top: 3px solid var(--gold); border-radius: 30px 30px 0 0; z-index: 3000; transition: 0.4s; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .sheet.active { bottom: 0; }
        .action-btn { background: var(--gold); color: #000; width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: 900; }
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-crown fa-spin" style="font-size: 40px; color: var(--gold);"></i></div>

    <div class="header">
        <div style="font-weight: 900; font-size: 20px; color: var(--gold);">WIN100 PRO</div>
        <div class="bal-box" id="user-balance">0.00 ج.م</div>
    </div>

    <div class="leagues-nav">
        <div class="league-btn active" onclick="changeLeague('soccer_epl', this)">الدوري الإنجليزي</div>
        <div class="league-btn" onclick="changeLeague('soccer_spain_la_liga', this)">الدوري الإسباني</div>
        <div class="league-btn" onclick="changeLeague('soccer_uefa_champs_league', this)">دوري الأبطال</div>
    </div>

    <div id="matches-container"></div>

    <button class="fab-gold" onclick="openSlip()">
        <div class="count" id="slip-count">0</div>
        <i class="fas fa-receipt" style="color:#000; font-size:24px;"></i>
    </button>

    <div id="main-sheet" class="sheet">
        <div id="sheet-header" style="text-align:center; margin-bottom:20px;" onclick="closeSheet()"><i class="fas fa-chevron-down"></i></div>
        <div id="sheet-body"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, serverTimestamp, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

    // نفس بيانات الفايربيس بتاعتك
    const firebaseConfig = {
        apiKey: "AIzaSyAzcP_T8x5ouwwKkhadtBTdsUxk3XqwJec",
        authDomain: "vexa-4b2fb.firebaseapp.com",
        projectId: "vexa-4b2fb",
        appId: "1:977620445308:web:fec22230e1fbb30c8881f9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentSlip = [];
    const API_KEY = '4a63ffac5fe58a9ec09b22e305c61c02';

    onAuthStateChanged(auth, (user) => {
        if(user) {
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if(snap.exists()) document.getElementById('user-balance').innerText = snap.data().walletBalance.toLocaleString() + " ج.م";
                document.getElementById('loader').style.display = 'none';
            });
            fetchMatches('soccer_epl');
        } else { window.location.href = 'index.html'; }
    });

    window.changeLeague = (league, btn) => {
        document.querySelectorAll('.league-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        fetchMatches(league);
    };

    // سحب الماتشات مع أسواق إضافية
    async function fetchMatches(league) {
        document.getElementById('matches-container').innerHTML = '<p style="text-align:center; padding:50px; opacity:0.5;">جاري سحب الأسواق المتاحة...</p>';
        try {
            // طلبنا h2h (فوز وخسارة) و totals (الأهداف)
            const res = await fetch(`https://api.the-odds-api.com/v4/sports/${league}/odds/?apiKey=${API_KEY}&regions=eu&markets=h2h,totals&oddsFormat=decimal`);
            const data = await res.json();
            renderMatches(data);
        } catch (e) { alert("حدث خطأ في جلب البيانات"); }
    }

    function renderMatches(data) {
        const container = document.getElementById('matches-container');
        container.innerHTML = data.map(m => `
            <div class="match-card" onclick='viewMarkets(${JSON.stringify(m)})'>
                <div style="font-size:11px; color:var(--gold); text-align:center; margin-bottom:10px;">${new Date(m.commence_time).toLocaleString('ar-EG', {weekday:'long', hour:'2-digit', minute:'2-digit'})}</div>
                <div class="teams">
                    <div class="team-name">${m.home_team}</div>
                    <div style="color:var(--gold); font-weight:bold;">VS</div>
                    <div class="team-name">${m.away_team}</div>
                </div>
                <div style="text-align:center; margin-top:10px; font-size:12px; color:#94a3b8;">عرض كافة الأسواق 🔥</div>
            </div>
        `).join('');
    }

    // وظيفة عرض كل الأسواق عند الضغط على الماتش
    window.viewMarkets = (match) => {
        const sheet = document.getElementById('main-sheet');
        const body = document.getElementById('sheet-body');
        sheet.classList.add('active');

        let html = `<div style="text-align:center; margin-bottom:20px;">
                        <h3 style="margin:0">${match.home_team} vs ${match.away_team}</h3>
                    </div>`;

        // استخراج الأسواق من أول Bookmaker متاح
        const bookmaker = match.bookmakers[0];
        if(!bookmaker) { body.innerHTML = html + "<p>لا توجد أسواق متاحة حالياً</p>"; return; }

        bookmaker.markets.forEach(market => {
            let marketTitle = market.key === 'h2h' ? 'النتيجة النهائية' : 'إجمالي الأهداف (Totals)';
            html += `
                <div class="market-section">
                    <div class="market-title">${marketTitle}</div>
                    <div class="odds-grid">
                        ${market.outcomes.map(o => `
                            <div class="odd-item" onclick="selectOdd('${match.home_team} vs ${match.away_team}', '${o.name}', ${o.price})">
                                <div style="font-size:12px; color:#94a3b8;">${o.name}</div>
                                <div style="font-size:16px; font-weight:bold; color:var(--gold);">${o.price}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });

        body.innerHTML = html + `<button class="action-btn" onclick="openSlip()">فتح القسيمة الآن</button>`;
    };

    window.selectOdd = (matchName, choice, price) => {
        const betId = matchName + choice;
        if(currentSlip.find(i => i.id === betId)) return alert("الماتش ده موجود فعلاً");
        
        currentSlip.push({ id: betId, match: matchName, choice: choice, price: price });
        updateSlipCount();
        alert(`تمت إضافة: ${choice} بـ أودز ${price}`);
    };

    function updateSlipCount() { document.getElementById('slip-count').innerText = currentSlip.length; }

    window.openSlip = () => {
        const sheet = document.getElementById('main-sheet');
        const body = document.getElementById('sheet-body');
        sheet.classList.add('active');

        if(currentSlip.length === 0) {
            body.innerHTML = `<div style="text-align:center; padding:50px;"><i class="fas fa-ticket-alt" style="font-size:50px; color:#1e293b;"></i><p>القسيمة فاضية يا بطل</p></div>`;
            return;
        }

        const totalOdds = currentSlip.reduce((acc, curr) => acc * curr.price, 1).toFixed(2);
        
        body.innerHTML = `
            <h3 style="margin-bottom:20px;">قسيمة الرهان</h3>
            ${currentSlip.map((s, i) => `
                <div class="bet-item">
                    <div>
                        <div style="font-size:14px; font-weight:bold;">${s.match}</div>
                        <div style="color:var(--gold); font-size:12px;">اختيارك: ${s.choice} (أودز: ${s.price})</div>
                    </div>
                    <i class="fas fa-times-circle" onclick="removeBet(${i})" style="color:#ef4444; font-size:20px;"></i>
                </div>
            `).join('')}
            <div style="background:rgba(0,0,0,0.3); padding:20px; border-radius:15px; margin-top:20px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>إجمالي الودات:</span><b style="color:var(--gold); font-size:20px;">${totalOdds}</b></div>
                <input type="number" id="bet-amount" placeholder="مبلغ الرهان" style="width:100%; padding:15px; background:var(--bg); border:1px solid var(--border); color:#fff; border-radius:10px; text-align:center; margin-bottom:15px;">
                <button class="action-btn" onclick="confirmBet()">تأكيد وخصم الرصيد</button>
            </div>
        `;
    };

    window.removeBet = (i) => { currentSlip.splice(i,1); updateSlipCount(); openSlip(); };
    window.closeSheet = () => document.getElementById('main-sheet').classList.remove('active');

    // تأكيد الرهان (نفس الكود بتاعك بس مع تعديل البيانات المرسلة)
    window.confirmBet = async () => {
        const amt = parseFloat(document.getElementById('bet-amount').value);
        if(!amt || amt < 5) return alert("أقل مبلغ رهان 5 ج.م");
        
        const user = auth.currentUser;
        try {
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);
            if(userSnap.data().walletBalance < amt) return alert("رصيدك ميقضيش!");

            await updateDoc(userRef, { walletBalance: increment(-amt) });
            await addDoc(collection(db, "users", user.uid, "transactions"), {
                title: "رهان من الأسواق المتعددة",
                amount: amt,
                type: "loss",
                status: "pending",
                timestamp: serverTimestamp(),
                details: currentSlip
            });

            alert("تم الرهان بنجاح! 🚀");
            currentSlip = []; updateSlipCount(); closeSheet();
        } catch (e) { alert("حدث خطأ في النظام"); }
    };
</script>
</body>
</html>
